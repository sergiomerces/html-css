<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídias em HTML5</title>
</head>
<body>
    <h1>Imagem Dinâmica</h1>
    <p>Tente abrir esse site em vários dispositivos diferentes ou simplesmente aumente e diminua o tamanho do seu navegador.</p>
    <picture>
        <source media="(max-width: 750px)" srcset="img/foto-p.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="img/foto-m.png" type="image/png">
        <img src="img/foto-g.png" alt="imagem responsiva">
    </picture>
    <h1>Repoduzindo Áudio</h1>
    <p>Vamos aprender a reproduzir áudios em HTML5.</p>
    <audio preload="metadata" controls autoplay>
        <source src="midias/Bay_Street_Billionaires-Squadda_B.mp3" type="audio/mpeg">
        <p>Seu navegador não suporta áudio <a href="midias/Bay_Street_Billionaires-Squadda_B.mp3" download="Bay_Street_Billionaires-Squadda_B.mp3" type="audio/mpeg">baixe esse arquivo</a>.</p>
    </audio>
</body>
</html>
