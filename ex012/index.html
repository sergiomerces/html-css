<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vídeos em HTML 5</title>
</head>
<body>
    <h1>Inserindo vídeos hospedados localmente</h1>
    <p>Este vídeo está hospedado no meu próprio servidor.</p>
    <video width="600" poster="img/thumb-video.png" controls autoplay> 
        <source src="midias/corrego.mp4" type="video/mp4">
        <source src="midias/corrego.m4v" type="video/m4v">
        <source src="midias/corrego.mkv" type="video/mkv">
        <source src="midias/corrego.webm" type="video/webm">
        <source src="midias/corrego.ogv" type="video/ogg">
        <p>Seu navegador não tem suporte pra reproduzir esse video <a href="midias/corrego.mp4" download="corrego.mp4" type="video/mp4">clique aqui para download</a>.</p>
    </video>
    <h2>Incorporando um vídeo do Youtube</h2>
    <iframe width="600" height="315" src="https://www.youtube.com/embed/UuyUhzpDjJY" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
    <h2>Inserindo vídeo do Vimeo</h2>
    <iframe src="https://player.vimeo.com/video/52736445?h=882c67bfa6&color=ff9933&portrait=0" width="600" height="450" frameborder="0" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe>
</body>
</html>
